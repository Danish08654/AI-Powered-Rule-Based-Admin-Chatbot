<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | Admin Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #007bff, #6c63ff);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .login-card h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #333;
    }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    .login-card input:focus {
      border-color: #007bff;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-card button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>👩‍💻 Admin Chatbot Login</h2>
    
    <form method="post">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
