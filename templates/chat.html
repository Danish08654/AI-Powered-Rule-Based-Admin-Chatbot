<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6fb;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      height: 80vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #007bff, #6c63ff);
      color: white;
      padding: 16px;
      font-size: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header button {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }

    .chat-header button:hover {
      background: rgba(255,255,255,0.4);
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.4;
    }

    .user-message {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot-message {
      align-self: flex-start;
      background: #f1f1f1;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .chat-input {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      background: #fafafa;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    .chat-input button {
      margin-left: 10px;
      padding: 12px 20px;
      background: #007bff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s;
    }

    .chat-input button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      👩‍💻 Admin Chatbot
      <form method="post" action="/logout" style="margin:0;">
        <button type="submit">Logout</button>
      </form>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages">
      <div class="bot-message message">👋 Hello! How can I help you manage users today?</div>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input id="user_input" type="text" placeholder="Type a command (e.g. add user, delete user)..." autofocus>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const inputField = document.getElementById("user_input");
      const text = inputField.value.trim();
      if (!text) return;

      // Show user message
      const messages = document.getElementById("messages");
      const userMsg = document.createElement("div");
      userMsg.className = "user-message message";
      userMsg.textContent = text;
      messages.appendChild(userMsg);
      inputField.value = "";

      // Scroll down
      messages.scrollTop = messages.scrollHeight;

      // Send to backend
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();

      // Show bot message
      const botMsg = document.createElement("div");
      botMsg.className = "bot-message message";
      botMsg.textContent = data.reply;
      messages.appendChild(botMsg);

      // Scroll again
      messages.scrollTop = messages.scrollHeight;
    }

    // Send message on Enter key
    document.getElementById("user_input")
      .addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });
  </script>
</body>
</html>
